{% if empty %}
<div class="text-center py-16 bg-white rounded-2xl shadow-sm border border-gray-100">
    <div class="w-16 h-16 mx-auto bg-gray-50 rounded-full flex items-center justify-center">
        <svg class="w-8 h-8 text-gray-300" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M20 13V6a2 2 0 00-2-2H6a2 2 0 00-2 2v7m16 0v5a2 2 0 01-2 2H6a2 2 0 01-2-2v-5m16 0h-2.586a1 1 0 00-.707.293l-2.414 2.414a1 1 0 01-.707.293h-3.172a1 1 0 01-.707-.293l-2.414-2.414A1 1 0 006.586 13H4" />
        </svg>
    </div>
    <p class="mt-4 text-gray-600 font-medium malayalam">ഈ പ്രദേശത്തെ ഡാറ്റ ഉടൻ ലഭ്യമാകും</p>
    <p class="text-sm text-gray-400 mt-1">Data for this area will be available soon</p>
</div>
{% else %}
<div class="text-center py-10 bg-white rounded-2xl shadow-sm border border-gray-100">
    <p class="font-semibold {{ 'text-red-600' if is_error else 'text-gray-700' }} malayalam">{{ title }}</p>
    {% if detail %}
    <p class="mt-1 text-sm text-gray-500 malayalam">{{ detail }}</p>
    {% endif %}
</div>
{% endif %}
