services:
  - type: web
    name: rationundo
    runtime: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: DATABASE_URL
        sync: false  # set this in Render dashboard to your Supabase connection string
      - key: PYTHON_VERSION
        value: "3.12.7"
