name: Daily Stock Scrape

on:
  schedule:
    # 20:30 UTC = 02:00 AM IST (avoids midnight month-boundary & GitHub peak-hour delays)
    - cron: "30 20 * * *"
  workflow_dispatch: {}  # allow manual runs

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -e .
          pip install psycopg2-binary

      - name: Run scraper
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SCRAPE_CONCURRENCY: "20"
        run: python scripts/scrape_all.py
