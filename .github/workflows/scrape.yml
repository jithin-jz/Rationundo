name: Daily Stock Scrape

on:
  schedule:
    # 20:30 UTC = 02:00 AM IST (avoids midnight month-boundary & GitHub peak-hour delays)
    - cron: "30 20 * * *"
    # Weekly coordinate + geocode refresh: Sundays 21:30 UTC (shop locations rarely change)
    - cron: "30 21 * * 0"
  workflow_dispatch: {}  # allow manual runs

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -e .
          pip install psycopg2-binary

      - name: Run scraper
        if: github.event.schedule == '30 20 * * *' || github.event_name == 'workflow_dispatch'
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SCRAPE_CONCURRENCY: "20"
        run: python scripts/scrape_all.py

      - name: Backfill shop coordinates
        if: github.event.schedule == '30 21 * * 0' || github.event_name == 'workflow_dispatch'
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python scripts/backfill_coords.py

      - name: Geocode pincodes & relink shops
        if: github.event.schedule == '30 21 * * 0' || github.event_name == 'workflow_dispatch'
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python scripts/geocode_and_relink.py

      - name: Backfill local place names
        if: github.event.schedule == '30 21 * * 0' || github.event_name == 'workflow_dispatch'
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python scripts/backfill_local_place.py
