name: Keep Render awake

# Pings the live site so Render's free instance doesn't spin down on idle.
# /health is a lightweight DB + freshness check, ideal as a ping target.
on:
  schedule:
    - cron: "*/15 * * * *"   # every 15 minutes
  workflow_dispatch:          # allow manual runs

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping /health
        run: |
          curl -fsS --max-time 30 --retry 2 \
            https://rationundo.onrender.com/health \
            || echo "ping failed (service may have been waking up)"
