services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: rationundo
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/init.sql
volumes:
  pgdata:
